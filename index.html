<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Projet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="conteneur-principal">

        <div class="entete-chat">
            <h1 class="titre-chatbot">Zeus bot</h1>
        </div>

        <div class="zone-chat" id="zone-chat"> <!-- class pour les appels css, id pour les appels js -->
            <div class="message message-bot">
                <p>Bienvenue ! Dites "bonjour" pour commencer.</p>
            </div>
        </div>

        <div class="zone-saisie">
            <input type="text" id="champ-texte" class="champ-texte" placeholder="Écrivez votre message..."
                autocomplete="off">
            <button id="bouton-envoyer" class="bouton-envoyer">Envoyer</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
